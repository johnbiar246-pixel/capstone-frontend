[build]
  command = "npm run build"
  publish = "dist"

# Only set JavaScript MIME types - don't affect CSS or other assets
[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/*.mjs"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/assets/*.mjs"
  [headers.values]
    Content-Type = "application/javascript"

# Redirect API requests to backend (for local dev or if VITE_API_URL is not set)
[[redirects]]
  from = "/api/*"
  to = "https://capstone-backend-1cgj.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
